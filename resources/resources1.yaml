apiVersion: apps/v1
kind: Deployment
metadata:
  name: resourcesapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resourceapp
  template:
    metadata:
      labels: 
        app: resourceapp
        
    spec:
      containers:
        -  name: nginxapp
           image: nginx
           resources:  #resources
             requests:
               memory: "128Mi"
               cpu: "100m"
             limits:
               memory: "128Mi"
               cpu: "100m"
           livenessProbe:   #healthCheck
             httpGet:
               path: /
               port: 80
           readinessProbe:
             httpGet:
               path: /
               port: 80