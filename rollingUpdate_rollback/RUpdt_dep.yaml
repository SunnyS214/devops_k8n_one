apiVersion: apps/v1
kind: Deployment
metadata:
  name: rolloutupdate1
spec:
  replicas: 2
  # rollingupdate
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
      
  selector:
    matchLabels:
      app: rupdateapp
  template:
    metadata:
      labels: 
        app: rupdateapp
        
    spec:
      containers:
        -  name: nginxapp
           image: nginx:1.14
          #  resources
           resources:
             requests:
               memory: "64Mi"
               cpu: "100m"
             limits:
               memory: "128Mi"
               cpu: "200m"

          # health check probe
           livenessProbe:
             httpGet:
               path: /
               port: 80
           readinessProbe:
             httpGet:
               path: /
               port: 80
