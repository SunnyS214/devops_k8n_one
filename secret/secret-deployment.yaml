apiVersion: apps/v1
kind: Deployment
metadata: 
  name: myapp
spec:
  replicas: 3
  selector: 
    matchLabels:
      app: mysecretapp
  template:
    metadata:
      labels:
        app: mysecretapp
    spec:
      containers:
        -  name: myapp
           image: nginx
           ports: 
             -  containerPort: 3000
           envFrom:
              - secretRef:
                    name: app-secret2
