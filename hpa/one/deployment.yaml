apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecomerse
spec:
  replicas: 4
  selector:
    matchLabels:
      app: myhpaapp
  template:
    metadata:
      labels:
        app: myhpaapp
    spec:
      containers:
        -  name: hpaappcont    
           image: nginx
           resources:
             requests:
               memory: "64Mi"
               cpu: "100m"
             limits:
               memory: "128Mi"
               cpu: "200m"
           livenessProbe:
             httpGet:
               path: /
               port: 80
           readinessProbe:
             httpGet:
               path: /
               port: 80
